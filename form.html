<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product review form page">
    <meta name="author" content="Carson Landvatter">
    <title>Product Review Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&family=Smooch+Sans:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <div class="form-container">
        <h1>Product Review</h1>
        <form action="review.html" method="get">
            
            <label for="product">Product Name:</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product</option>
            </select>

            <label>Overall Rating</label>
            <div class="rating">

                <input type="radio" id="star1" name="rating" value="1" required>
                <label for="star1">⭐️</label>

                <input type="radio" id="star2" name="rating" value="2" required>
                <label for="star1">⭐️⭐️</label>

                <input type="radio" id="star3" name="rating" value="3" required>
                <label for="star1">⭐️⭐️⭐️</label>

                <input type="radio" id="star4" name="rating" value="4" required>
                <label for="star1">⭐️⭐️⭐️⭐️</label>

                <input type="radio" id="star5" name="rating" value="5" required>
                <label for="star1">⭐️⭐️⭐️⭐️⭐️</label>

            </div>
            <label for="install-date">Date of Installation:</label>
            <input type="date" id="install-date" name="install-date" required>

            <fieldset>
                <legend>Which features did you find useful?</legend>

                <input type="checkbox" id="durability" name="features" value="Durability">
                <label for="durability">Durability</label>

                <input type="checkbox" id="ease" name="features" value="Ease of Use">
                <label for="ease">Ease of Use</label>

                <input type="checkbox" id="performance" name="features" value="Performance">
                <label for="performance">Performance</label>

                <input type="checkbox" id="design" name="features" value="Design">
                <label for="design">Design</label>
            </fieldset>

            <label for="review">Written Review(Optional):</label>
            <textarea id="review" name="review"></textarea>

            <label for="username">Your Name (Optional):</label>
            <input type="text" id="username" name="username">

            <input type="submit" value="Post Review">
        </form>
        <footer>
            <p>©<span id="currentYear"></span> | Carson Landvatter | Salt Lake City, Utah</p>
            <p>Last Modified: <span id="lastModified"></span></p>
        </footer>
    </div>
</body>
</html>
